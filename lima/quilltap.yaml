# Lima VM template for Quilltap
# Usage:
#   npm run build:electron:rootfs                  # build the app tarball (needs Docker)
#   LIMA_HOME=~/.qtlima limactl create --name quilltap lima/quilltap.yaml
#   LIMA_HOME=~/.qtlima limactl start quilltap
#   curl http://localhost:5050/api/health
#   LIMA_HOME=~/.qtlima limactl stop quilltap
#   LIMA_HOME=~/.qtlima limactl delete quilltap

# Apple Virtualization.framework — no QEMU dependency
vmType: vz

# Alpine Linux nocloud images with cloud-init (required for Lima SSH provisioning)
images:
  - location: "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/cloud/nocloud_alpine-3.21.2-aarch64-uefi-cloudinit-r0.qcow2"
    arch: "aarch64"
    digest: "sha512:08d340126b222abae651a20aa63c3ee3dc601d703de7879d2a6bc1fe82a3664d058a2c55ad0cf8a874327f7535e3af8a9384ce438217d6f32200cad1462a5b32"
  - location: "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/cloud/nocloud_alpine-3.21.2-x86_64-uefi-cloudinit-r0.qcow2"
    arch: "x86_64"
    digest: "sha512:1aaf22b4a584e69e228e6aa38a295159c0143d9ccebe7ad4928e92b414714066af3bfe5f9e0ca4d4d64a70ca9fea09033af90258a6f2344130d70b660151127a"

cpus: 2
memory: "4GiB"
disk: "10GiB"

mounts:
  # User data: host data directory → guest /data/quilltap (writable)
  - location: "~/Library/Application Support/Quilltap"
    mountPoint: "/data/quilltap"
    writable: true

  # Build artifacts: rootfs tarball for provisioning (read-only)
  # Outside LIMA_HOME to avoid Lima treating it as an instance directory
  - location: "~/Library/Caches/Quilltap/lima-images"
    mountPoint: "/mnt/lima-images"
    writable: false

# Port forward: host 5050 → guest 3000
portForwards:
  - guestPort: 3000
    hostPort: 5050
    proto: tcp

# Alpine uses OpenRC, not systemd — disable containerd (requires systemd)
containerd:
  system: false
  user: false

networks:
  - vzNAT: true

# Provision the VM: extract Node.js + app from Docker rootfs, start the service
provision:
  - mode: system
    script: |
      #!/bin/sh
      set -eux

      # ── Environment variables ──────────────────────────────────────
      cat > /etc/profile.d/quilltap.sh <<'ENVEOF'
      export LIMA_CONTAINER=true
      export QUILLTAP_DATA_DIR=/data/quilltap
      export QUILLTAP_HOST_DATA_DIR="~/Library/Application Support/Quilltap"
      export NODE_ENV=production
      export PORT=3000
      export HOSTNAME=0.0.0.0
      export NODE_OPTIONS="--max-old-space-size=2048"
      export QUILLTAP_TIMEZONE=""
      ENVEOF
      chmod 644 /etc/profile.d/quilltap.sh

      # Source them now for the rest of this script
      . /etc/profile.d/quilltap.sh

      # ── Ensure data directories exist ──────────────────────────────
      mkdir -p /data/quilltap/data \
               /data/quilltap/files \
               /data/quilltap/logs \
               /data/quilltap/plugins/npm

      # ── Extract Node.js and the Quilltap app from the rootfs ───────
      # We extract Node.js from the Docker image rather than installing
      # via apk, because Alpine's packaged nodejs has SQLite symbol
      # relocation errors. The Docker image's Node (node:22-alpine) is
      # built correctly. Since both Node and /app/ come from the same
      # image, native modules (better-sqlite3) are already compiled
      # for the right Node version — no npm rebuild needed.
      TARBALL=/mnt/lima-images/quilltap-linux-arm64.tar.gz
      if [ ! -f "$TARBALL" ]; then
        echo "ERROR: Rootfs tarball not found at $TARBALL"
        echo "Run 'npm run build:electron:rootfs' first."
        exit 1
      fi

      # Extract Node.js runtime and the application
      tar xzf "$TARBALL" -C / usr/local/bin/node usr/local/lib/node_modules/ app/

      # Install runtime library dependencies that native modules need
      apk update
      apk add --no-cache libstdc++ libgcc zip unzip

      # ── Remove Docker false-positive marker ────────────────────────
      rm -f /.dockerenv

      # ── OpenRC service for Quilltap ────────────────────────────────
      cat > /etc/init.d/quilltap <<'SVCEOF'
      #!/sbin/openrc-run

      name="quilltap"
      description="Quilltap AI Workspace"

      command="/usr/local/bin/node"
      command_args="/app/server.js"
      command_background=true
      pidfile="/run/${RC_SVCNAME}.pid"
      output_log="/data/quilltap/logs/quilltap-stdout.log"
      error_log="/data/quilltap/logs/quilltap-stderr.log"

      export LIMA_CONTAINER=true
      export QUILLTAP_DATA_DIR=/data/quilltap
      export QUILLTAP_HOST_DATA_DIR="~/Library/Application Support/Quilltap"
      export NODE_ENV=production
      export PORT=3000
      export HOSTNAME=0.0.0.0
      export NODE_OPTIONS="--max-old-space-size=2048"
      export QUILLTAP_TIMEZONE=""

      depend() {
        need net
        after firewall
      }
      SVCEOF
      chmod 755 /etc/init.d/quilltap

      # Enable and start the service
      rc-update add quilltap default
      rc-service quilltap start
