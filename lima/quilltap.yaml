# Lima VM template for Quilltap
# Usage:
#   npm run build:electron:rootfs                  # build the app tarball (needs Docker)
#   LIMA_HOME=~/.qtlima limactl create --name quilltap lima/quilltap.yaml
#   LIMA_HOME=~/.qtlima limactl start quilltap
#   curl http://localhost:5050/api/health
#   LIMA_HOME=~/.qtlima limactl stop quilltap
#   LIMA_HOME=~/.qtlima limactl delete quilltap

# Apple Virtualization.framework — no QEMU dependency
vmType: vz

# Debian 12 (bookworm) nocloud images with cloud-init.
# We use Debian/glibc (not Alpine/musl) to match the standalone tarball, which
# is built FROM node:24-bookworm-slim (see quilltap-server/Dockerfile). The Node
# binary and native modules in the tarball are glibc-linked and will not exec
# on a musl host — execve returns ENOENT for the missing /lib/ld-linux-*.so.1.
#
# To pin a snapshot for releases, replace `latest` with a dated directory from
# https://cloud.debian.org/images/cloud/bookworm/ and fill in the SHA512 digest.
images:
  - location: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-nocloud-arm64.qcow2"
    arch: "aarch64"
  - location: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-nocloud-amd64.qcow2"
    arch: "x86_64"

cpus: 2
memory: "4GiB"
disk: "10GiB"

mounts:
  # User data: host data directory → guest /data/quilltap (writable)
  - location: "~/Library/Application Support/Quilltap"
    mountPoint: "/data/quilltap"
    writable: true

  # Build artifacts: rootfs tarball for provisioning (read-only)
  # Outside LIMA_HOME to avoid Lima treating it as an instance directory
  - location: "~/Library/Caches/Quilltap/lima-images"
    mountPoint: "/mnt/lima-images"
    writable: false

# Port forward: host 5050 → guest 3000
portForwards:
  - guestPort: 3000
    hostPort: 5050
    proto: tcp

# We run Quilltap directly via systemd; no containerd needed.
containerd:
  system: false
  user: false

networks:
  - vzNAT: true

# Provision the VM: extract Node.js + app from the rootfs tarball, install the
# systemd service, and start it.
provision:
  - mode: system
    script: |
      #!/bin/sh
      set -eux

      # ── Environment variables ──────────────────────────────────────
      # Two copies: one for interactive shells (profile.d), one for the
      # systemd unit (EnvironmentFile, plain KEY=VALUE lines).
      cat > /etc/profile.d/quilltap.sh <<'ENVEOF'
      export LIMA_CONTAINER=true
      export QUILLTAP_DATA_DIR=/data/quilltap
      export QUILLTAP_HOST_DATA_DIR="~/Library/Application Support/Quilltap"
      export NODE_ENV=production
      export PORT=3000
      export HOSTNAME=0.0.0.0
      export NODE_OPTIONS="--max-old-space-size=4096"
      export QUILLTAP_TIMEZONE=""
      export QUILLTAP_SHELL=""
      export QUILLTAP_SHELL_CAPABILITIES=""
      ENVEOF
      chmod 644 /etc/profile.d/quilltap.sh

      cat > /etc/quilltap.env <<'ENVEOF'
      LIMA_CONTAINER=true
      QUILLTAP_DATA_DIR=/data/quilltap
      QUILLTAP_HOST_DATA_DIR=~/Library/Application Support/Quilltap
      NODE_ENV=production
      PORT=3000
      HOSTNAME=0.0.0.0
      NODE_OPTIONS=--max-old-space-size=4096
      QUILLTAP_TIMEZONE=
      QUILLTAP_SHELL=
      QUILLTAP_SHELL_CAPABILITIES=
      ENVEOF
      chmod 644 /etc/quilltap.env

      # Source for the rest of this script
      . /etc/profile.d/quilltap.sh

      # ── Ensure data directories exist ──────────────────────────────
      mkdir -p /data/quilltap/data \
               /data/quilltap/files \
               /data/quilltap/logs \
               /data/quilltap/plugins/npm

      # ── Extract Node.js and the Quilltap app from the rootfs ───────
      # The tarball is produced from node:24-bookworm-slim (Debian/glibc)
      # via quilltap-server's Dockerfile. Native modules (better-sqlite3,
      # sharp, @napi-rs/canvas) ship pre-compiled glibc binaries — no
      # npm rebuild needed once we extract.
      TARBALL=/mnt/lima-images/quilltap-linux-arm64.tar.gz
      if [ ! -f "$TARBALL" ]; then
        echo "ERROR: Rootfs tarball not found at $TARBALL"
        echo "Run 'npm run build:electron:rootfs' first."
        exit 1
      fi

      # Extract Node.js runtime and the application
      tar xzf "$TARBALL" -C / usr/local/bin/node usr/local/lib/node_modules/ app/

      # Install runtime tools we need beyond the Debian base. libstdc++6,
      # libgcc-s1, and zlib1g already ship in bookworm-slim.
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq
      apt-get install -y --no-install-recommends zip unzip
      rm -rf /var/lib/apt/lists/*

      # ── Remove Docker false-positive marker ────────────────────────
      rm -f /.dockerenv

      # ── systemd service for Quilltap ───────────────────────────────
      cat > /etc/systemd/system/quilltap.service <<'SVCEOF'
      [Unit]
      Description=Quilltap AI Workspace
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      EnvironmentFile=/etc/quilltap.env
      WorkingDirectory=/app
      ExecStart=/usr/local/bin/node /app/server.js
      Restart=on-failure
      RestartSec=2
      StandardOutput=append:/data/quilltap/logs/quilltap-stdout.log
      StandardError=append:/data/quilltap/logs/quilltap-stderr.log

      [Install]
      WantedBy=multi-user.target
      SVCEOF
      chmod 644 /etc/systemd/system/quilltap.service

      # Enable and start the service
      systemctl daemon-reload
      systemctl enable --now quilltap.service
