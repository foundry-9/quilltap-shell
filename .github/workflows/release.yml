name: Release

on:
  push:
    tags:
      # Matches:
      # - 4.0.3
      # - 4.1.0-dev.5
      # - 4.1.0-beta.1
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' is not valid semver-ish (expected 1.2.3 or 1.2.3-dev.21)"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Electron builds — compile TypeScript, rebuild native modules for each
  # platform's Electron ABI, package with electron-builder.
  # macOS also stages Lima binaries and handles code signing + notarization.
  # ────────────────────────────────────────────────────────────────────────────
  build-electron-mac:
    name: Build Electron (macOS)
    runs-on: macos-latest
    needs: validate-tag

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/certificate.XXXXXX.p12)
          echo "$CSC_LINK" | base64 --decode > "$CERT_FILE"

          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_FILE" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/security \
            -f pkcs12

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"' | xargs)

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm "$CERT_FILE"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Write Apple API key to file
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEY_FILE="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "APPLE_API_KEY=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Stage Lima binaries
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: npx tsx scripts/stage-lima.ts

      - name: Rebuild native modules for Electron
        run: npx tsx scripts/rebuild-native-modules.ts

      - name: Compile Electron shell
        run: npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        timeout-minutes: 60
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          DEBUG: electron-notarize*
        run: NODE_OPTIONS="-r ./electron/patch-fs.js" npx electron-builder --mac

      - name: Clean up keychain and API key
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$APPLE_API_KEY" || true

      - name: Upload macOS installer
        uses: actions/upload-artifact@v7
        with:
          name: electron-mac
          path: out/*.dmg
          retention-days: 5

  build-electron-win:
    name: Build Electron (Windows)
    runs-on: windows-latest
    needs: validate-tag
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx tsx scripts/rebuild-native-modules.ts

      - name: Compile Electron shell
        run: npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npx electron-builder --win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: electron-win
          path: out/*.exe
          retention-days: 5

  build-electron-linux:
    name: Build Electron (Linux)
    runs-on: ubuntu-latest
    needs: validate-tag

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx tsx scripts/rebuild-native-modules.ts

      - name: Compile Electron shell
        run: npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        run: npx electron-builder --linux

      - name: Upload Linux installers
        uses: actions/upload-artifact@v7
        with:
          name: electron-linux
          path: |
            out/*.AppImage
            out/*.deb
          retention-days: 5

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-electron-mac, build-electron-win, build-electron-linux]
    if: ${{ !cancelled() && needs.build-electron-mac.result == 'success' && needs.build-electron-linux.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine release type
        id: release-type
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CLEAN_TAG=true
          else
            CLEAN_TAG=false
          fi

          ON_MAIN=$(git branch -r --contains HEAD | grep -q 'origin/main' && echo true || echo false)

          if [[ "$CLEAN_TAG" == "true" && "$ON_MAIN" == "true" ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Release type: production"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Release type: prerelease (clean_tag=$CLEAN_TAG, on_main=$ON_MAIN)"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          PRERELEASE_FLAG=""
          if [[ "${{ steps.release-type.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          cat > /tmp/release-body.md <<'BODY'
          ## Installation

          ### macOS

          1. Download the `.dmg` file and open it
          2. Drag **Quilltap** to your Applications folder
          3. Launch Quilltap from Applications

          ### Windows

          1. Download and run the `.exe` installer
          2. Follow the installation prompts
          3. Launch Quilltap from the Start Menu or desktop shortcut

          ### Linux

          1. Download the `.AppImage` file, make it executable (`chmod +x`), and run it
          2. Or install the `.deb` package: `sudo dpkg -i quilltap_*.deb`
          BODY

          sed -i 's/^          //' /tmp/release-body.md

          # Collect release assets — Windows may be missing if that build failed
          ASSETS=(
            artifacts/electron-mac/*.dmg
            artifacts/electron-linux/*.AppImage
            artifacts/electron-linux/*.deb
          )
          for f in artifacts/electron-win/*.exe; do
            [ -e "$f" ] && ASSETS+=("$f")
          done

          if [ ! -d artifacts/electron-win ] || [ -z "$(ls artifacts/electron-win/*.exe 2>/dev/null)" ]; then
            echo "::warning::Windows Electron build was not available — releasing without Windows installer"
          fi

          gh release create "$TAG" \
            --title "Quilltap Shell $TAG" \
            --notes-file /tmp/release-body.md \
            $PRERELEASE_FLAG \
            "${ASSETS[@]}"
