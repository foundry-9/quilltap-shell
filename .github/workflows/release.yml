name: Release

on:
  push:
    tags:
      # Matches:
      # - 4.0.3
      # - 4.1.0-dev.5
      # - 4.1.0-beta.1
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

# Every meaningful step in this workflow delegates to a script under
# scripts/release/. Each script is runnable locally with the same env vars
# the workflow uses, which makes the release process easier to troubleshoot
# without having to push a tag.

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Validate tag format
        run: npx tsx scripts/release/validate-tag.ts

  # ────────────────────────────────────────────────────────────────────────────
  # Electron builds — compile TypeScript, rebuild native modules for each
  # platform's Electron ABI, package with electron-builder.
  # macOS also stages Lima binaries and handles code signing + notarization.
  # ────────────────────────────────────────────────────────────────────────────
  build-electron-mac:
    name: Build Electron (macOS)
    runs-on: macos-latest
    needs: validate-tag

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npx tsx scripts/release/import-signing-cert.ts

      - name: Write Apple API key to file
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: npx tsx scripts/release/write-apple-api-key.ts

      - name: Stage Lima binaries
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: npx tsx scripts/stage-lima.ts

      - name: Rebuild native modules for Electron
        run: npx tsx scripts/rebuild-native-modules.ts

      - name: Compile Electron shell
        run: npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        timeout-minutes: 60
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          DEBUG: electron-notarize*
        run: npx tsx scripts/release/build-electron.ts mac

      - name: Clean up keychain and API key
        if: always()
        run: npx tsx scripts/release/cleanup-keychain.ts

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: electron-mac
          path: |
            out/*.dmg
            out/*.zip
            out/latest-mac.yml
          retention-days: 5

  build-electron-win:
    name: Build Electron (Windows)
    runs-on: windows-latest
    needs: validate-tag

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx tsx scripts/rebuild-native-modules.ts

      - name: Compile Electron shell
        run: npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npx tsx scripts/release/build-electron.ts win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: electron-win
          path: |
            out/*.exe
            out/latest.yml
          retention-days: 5

  build-electron-linux:
    name: Build Electron (Linux)
    runs-on: ubuntu-latest
    needs: validate-tag

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx tsx scripts/rebuild-native-modules.ts

      - name: Compile Electron shell
        run: npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: npx tsx scripts/release/build-electron.ts linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: electron-linux
          path: |
            out/*.AppImage
            out/*.deb
            out/latest-linux.yml
          retention-days: 5

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-electron-mac, build-electron-win, build-electron-linux]
    # Run as long as the workflow wasn't cancelled. create-github-release.ts
    # decides whether the collected artifacts are sufficient — every platform
    # must contribute at least one installer (signed or unsigned).
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine release type
        id: release-type
        run: npx tsx scripts/release/determine-release-type.ts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          PRERELEASE: ${{ steps.release-type.outputs.prerelease }}
          ARTIFACTS_DIR: artifacts
        run: npx tsx scripts/release/create-github-release.ts
